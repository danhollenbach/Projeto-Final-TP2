<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas listas · Mercadão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-900: #7a0d13;
            --red-700: #a8121a;
            --red-600: #c9161c;
            --red-500: #ea1d2c;
            --red-400: #ff4d4d;
            --cream: #fff5f0;
            --ink: #3a0c0c;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at 15% 0%, rgba(255,255,255,0.10), transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(0,0,0,0.15), transparent 50%),
                linear-gradient(150deg, var(--red-900) 0%, var(--red-500) 55%, var(--red-400) 100%);
            color: var(--cream);
            padding: 56px 24px;
        }

        .wrap {
            max-width: 720px;
            margin: 0 auto;
        }

        /* Cabeçalho de boas-vindas */
        .hero {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 36px;
        }

        .hero-text .eyebrow {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.4px;
            color: rgba(255,255,255,0.75);
            margin-bottom: 4px;
        }

        h1 {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            margin: 0;
            text-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }

        /* Botão "Criar nova lista" */
        a.btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 1.02rem;
            letter-spacing: 0.2px;
            color: var(--red-700);
            background: linear-gradient(180deg, #ffffff, #ffe9e0);
            padding: 14px 24px;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.30), inset 0 -3px 0 rgba(0,0,0,0.06);
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
            white-space: nowrap;
        }

        a.btn-primary:hover {
            filter: brightness(1.03);
            box-shadow: 0 16px 30px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }

        a.btn-primary:active {
            transform: translateY(1px) scale(0.99);
        }

        /* Divisor sutil no lugar do <hr> */
        .divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            margin: 8px 0 32px;
        }

        h2 {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            margin: 0 0 18px;
        }

        /* Lista de listas */
        ul.lists {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 14px;
        }

        ul.lists li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 18px;
            backdrop-filter: blur(6px);
            font-weight: 700;
            font-size: 1.05rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.15s ease, background 0.15s ease;
        }

        ul.lists li:hover {
            background: rgba(255, 255, 255, 0.13);
            transform: translateY(-2px);
        }

        ul.lists li::before {
            content: "📋";
            font-size: 1.2rem;
        }

        /* Estado vazio */
        ul.lists li.empty {
            justify-content: center;
            text-align: center;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.04);
            border-style: dashed;
        }

        ul.lists li.empty::before {
            content: "🗒️";
        }

        @media (prefers-reduced-motion: reduce) {
            a.btn-primary, ul.lists li { transition: none; transform: none; }
        }
    </style>
</head>
<body>

    <div class="wrap">
        <div class="hero">
            <div class="hero-text">
                <span class="eyebrow">Mercadão</span>
                <h1>Bem-vindo, {{ user.username }}</h1>
            </div>

            <a class="btn-primary" href="{% url 'catalog:create_list' %}">
                ➕ Criar nova lista
            </a>
        </div>

        <hr class="divider">

        <h2>Minhas listas</h2>

        <ul class="lists">
            {% for lista in lists %}
                <li>{{ lista.name }}</li>
            {% empty %}
                <li class="empty">Você ainda não criou listas</li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
