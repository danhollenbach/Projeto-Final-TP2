<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta · Mercadão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-900: #7a0d13;
            --red-700: #a8121a;
            --red-600: #c9161c;
            --red-500: #ea1d2c;
            --red-400: #ff4d4d;
            --cream: #fff5f0;
            --ink: #3a0c0c;
            --error: #ffd7d7;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 15% 20%, rgba(255,255,255,0.10), transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(0,0,0,0.15), transparent 50%),
                linear-gradient(150deg, var(--red-900) 0%, var(--red-500) 55%, var(--red-400) 100%);
            position: relative;
            overflow: hidden;
            color: var(--cream);
            padding: 24px;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            filter: blur(2px);
        }
        body::before {
            width: 420px;
            height: 420px;
            top: -120px;
            left: -140px;
        }
        body::after {
            width: 320px;
            height: 320px;
            bottom: -100px;
            right: -100px;
            background: rgba(0,0,0,0.10);
        }

        .card {
            position: relative;
            z-index: 2;
            width: min(440px, 100%);
            padding: 48px 36px 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 28px;
            backdrop-filter: blur(6px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.35);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 18px;
            background: linear-gradient(135deg, #ffffff, #ffe1d6);
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
            font-size: 30px;
        }

        h1 {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: clamp(1.7rem, 5vw, 2.1rem);
            margin: 0 0 8px;
            letter-spacing: 0.3px;
            text-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }

        p.subtitle {
            margin: 0 0 28px;
            font-size: 1rem;
            line-height: 1.5;
            color: rgba(255,255,255,0.88);
            font-weight: 600;
        }

        form {
            text-align: left;
        }

        /* Estiliza a saída padrão do {{ form.as_p }} do Django */
        form p {
            margin: 0 0 20px;
        }

        form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.2px;
            color: rgba(255,255,255,0.92);
        }

        form input,
        form select {
            width: 100%;
            padding: 14px 16px;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--ink);
            background: #fff5f0;
            border: 2px solid transparent;
            border-radius: 14px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        form input::placeholder {
            color: #b98d84;
            font-weight: 500;
        }

        form input:focus,
        form select:focus {
            border-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.25);
        }

        /* Texto de ajuda (help_text) que o Django coloca junto ao campo */
        form .helptext {
            display: block;
            margin-top: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            color: rgba(255,255,255,0.65);
        }

        /* Lista de erros por campo (ul.errorlist) */
        form ul.errorlist {
            list-style: none;
            margin: 0 0 8px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.25);
        }

        form ul.errorlist li {
            color: var(--error);
            font-weight: 700;
            font-size: 0.85rem;
        }

        button {
            font-family: 'Baloo 2', sans-serif;
            width: 100%;
            margin-top: 6px;
            padding: 18px 24px;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            color: var(--red-700);
            background: linear-gradient(180deg, #ffffff, #ffe9e0);
            box-shadow: 0 12px 24px rgba(0,0,0,0.30), inset 0 -3px 0 rgba(0,0,0,0.06);
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        button:hover {
            filter: brightness(1.03);
            box-shadow: 0 16px 30px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px) scale(0.99);
        }

        .foot-note {
            margin-top: 24px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.75);
            font-weight: 600;
            text-align: center;
        }

        .foot-note a {
            color: #ffe08a;
            font-weight: 700;
            text-decoration: none;
        }

        .foot-note a:hover {
            text-decoration: underline;
        }

        @media (prefers-reduced-motion: reduce) {
            button, button:hover { transition: none; transform: none; }
        }
    </style>
</head>
<body>

    <main class="card">
        <div class="badge" aria-hidden="true">📝</div>

        <h1>Criar conta</h1>
        <p class="subtitle">Leva menos de um minuto</p>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <p class="foot-note">Já tem conta? <a href="/accounts/login/">Entrar</a></p>
    </main>

</body>
</html>
