<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>Entrar no sistema</h1>

    {% if form.errors %}
        <p>Usuário ou senha inválidos.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label for="{{ form.username.id_for_label }}">Usuário</label>
            {{ form.username }}
        </p>

        <p>
            <label for="{{ form.password.id_for_label }}">Senha</label>
            {{ form.password }}
        </p>

        <button type="submit">Entrar</button>
    </form>
</body>
</html>
